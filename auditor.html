<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>行程审计器 | 行前体检</title>
  <style>
    :root {
      --ink: #18201d;
      --muted: #5f6963;
      --paper: #f7f4ee;
      --line: #d8d0c3;
      --accent: #2f6f73;
      --danger: #b64f3f;
      --white: #fffaf2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.6;
    }

    header, main, footer {
      width: min(1040px, calc(100% - 36px));
      margin: 0 auto;
    }

    header {
      padding: 34px 0 24px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
    }

    a { color: inherit; }

    .back {
      text-decoration: none;
      color: var(--muted);
      font-size: 15px;
    }

    h1 {
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing: 0;
      margin: 30px 0 14px;
      max-width: 760px;
    }

    .lead {
      color: var(--muted);
      font-size: 18px;
      max-width: 760px;
      margin: 0 0 28px;
    }

    .tool {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 390px);
      gap: 20px;
      align-items: start;
      margin: 34px 0 60px;
    }

    textarea {
      width: 100%;
      min-height: 430px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      background: var(--white);
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 111, 115, .16);
    }

    .side {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
    }

    button {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 720;
      cursor: pointer;
    }

    .score {
      margin: 18px 0;
      padding: 16px;
      border-radius: 8px;
      background: #e8ece7;
      font-size: 22px;
      font-weight: 760;
    }

    .score.high { background: #f3ded8; color: #7a2d22; }
    .score.mid { background: #f4ead4; color: #6a4a12; }
    .score.low { background: #dfeee4; color: #205237; }

    .result {
      display: grid;
      gap: 12px;
    }

    .item {
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .item strong {
      display: block;
      margin-bottom: 4px;
    }

    .muted {
      color: var(--muted);
    }

    footer {
      padding: 30px 0 46px;
      border-top: 1px solid var(--line);
      color: var(--muted);
    }

    @media (max-width: 820px) {
      header {
        display: block;
      }

      .tool {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <header>
    <strong>行前体检</strong>
    <a class="back" href="index.html">返回首页</a>
  </header>

  <main>
    <h1>把你的行程粘进来，先做一次粗略风险审计。</h1>
    <p class="lead">这个工具只做初筛：它会根据文本里的天数、跨城、山区/雪季/离岛、拍摄时间和节奏词，提示可能需要人工复核的地方。</p>

    <div class="tool">
      <textarea id="plan" spellcheck="false" placeholder="示例：
Day 1 上海飞札幌，晚上去小樽
Day 2 小樽、余市、登别、洞爷湖
Day 3 洞爷湖日出，下午函馆夜景
Day 4 函馆去青森，晚上回札幌
Day 5 札幌购物，回国"></textarea>

      <aside class="side">
        <button id="audit">审计行程</button>
        <div id="score" class="score">等待输入</div>
        <div id="result" class="result">
          <p class="muted">粘贴行程后点击按钮。结果不是最终建议，只是帮你找出最该核对的点。</p>
        </div>
      </aside>
    </div>
  </main>

  <footer>正式出行前，请以官方交通、天气、住宿、安全与保险信息为准。</footer>

  <script>
    const riskRules = [
      {
        name: "跨城移动可能过多",
        test: text => (text.match(/札幌|函馆|东京|大阪|京都|青森|小樽|登别|洞爷|富良野|美瑛|镰仓|奈良|神户/g) || []).length >= 8,
        advice: "同一天塞入多个城市时，最容易低估换乘、寄存行李、吃饭和休息时间。"
      },
      {
        name: "山岳/徒步需要安全复核",
        test: text => /登山|徒步|雪山|低山|山屋|缆车|高山|富士山|上高地|阿尔卑斯|锁链|路线|撤退/.test(text),
        advice: "山岳路线需要核对天气、开放期、装备、体力、保险、通讯和撤退方案。"
      },
      {
        name: "雪季或冬季风险",
        test: text => /冬|雪|北海道|东北|暴风雪|结冰|白天|日照|雪道|自驾/.test(text),
        advice: "冬季行程要特别核对日照长度、路况、交通停运、鞋服和备用日。"
      },
      {
        name: "离岛/偏远交通风险",
        test: text => /离岛|船|渡轮|岛|海岛|直升机|巴士|末班|接驳|无人/.test(text),
        advice: "离岛和偏远地区要预留错过船班/巴士后的方案。"
      },
      {
        name: "拍摄时间可能缺失",
        test: text => /摄影|拍照|胶片|日出|日落|蓝调|极光|机位|相机|镜头/.test(text) && !/等待|备用|休息|空档|预留/.test(text),
        advice: "摄影旅行需要等待和备用时段，不然只会变成赶路加举相机。"
      },
      {
        name: "节奏词显示可能过满",
        test: text => (text.match(/然后|接着|再去|顺路|打卡|晚上还|下午再|上午.*下午/g) || []).length >= 4,
        advice: "频繁出现连续转场词，通常意味着计划看起来顺，实际没有缓冲。"
      }
    ];

    function countDays(text) {
      const matches = text.match(/day\s*\d+|第[一二三四五六七八九十\d]+天|D\d+/gi);
      return matches ? new Set(matches.map(x => x.toLowerCase())).size : 0;
    }

    function auditPlan() {
      const text = document.getElementById("plan").value.trim();
      const score = document.getElementById("score");
      const result = document.getElementById("result");

      if (!text) {
        score.className = "score";
        score.textContent = "等待输入";
        result.innerHTML = '<p class="muted">先粘贴你的每日行程。</p>';
        return;
      }

      const hits = riskRules.filter(rule => rule.test(text));
      const days = countDays(text);
      const density = days ? Math.round(text.length / days) : text.length;
      let level = "低风险";
      let cls = "low";

      if (hits.length >= 4 || density > 180) {
        level = "高风险，建议人工重排";
        cls = "high";
      } else if (hits.length >= 2 || density > 110) {
        level = "中风险，建议重点复核";
        cls = "mid";
      }

      score.className = "score " + cls;
      score.textContent = level;

      const meta = `<div class="item"><strong>基础观察</strong><span class="muted">识别到 ${days || "未知"} 天行程，命中 ${hits.length} 个风险规则。</span></div>`;
      const details = hits.length
        ? hits.map(hit => `<div class="item"><strong>${hit.name}</strong><span class="muted">${hit.advice}</span></div>`).join("")
        : '<div class="item"><strong>没有明显文本风险</strong><span class="muted">这不代表行程一定可行，关键交通和季节仍需人工核对。</span></div>';

      result.innerHTML = meta + details;
    }

    document.getElementById("audit").addEventListener("click", auditPlan);
  </script>
</body>
</html>
