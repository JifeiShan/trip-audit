<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>提交路线体检信息 | 行前体检</title>
  <style>
    :root {
      --ink: #18201d;
      --muted: #5f6963;
      --paper: #f7f4ee;
      --line: #d8d0c3;
      --accent: #2f6f73;
      --white: #fffaf2;
      --soft: #e8ece7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.6;
    }

    header, main, footer {
      width: min(980px, calc(100% - 36px));
      margin: 0 auto;
    }

    header {
      padding: 34px 0 24px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
    }

    a { color: inherit; }

    .back {
      text-decoration: none;
      color: var(--muted);
      font-size: 15px;
    }

    h1 {
      font-size: clamp(34px, 6vw, 62px);
      line-height: 1.04;
      letter-spacing: 0;
      max-width: 760px;
      margin: 30px 0 14px;
    }

    .lead {
      color: var(--muted);
      font-size: 18px;
      max-width: 760px;
      margin: 0 0 26px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 340px);
      gap: 20px;
      align-items: start;
      margin: 34px 0 60px;
    }

    textarea {
      width: 100%;
      min-height: 620px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      background: var(--white);
      color: var(--ink);
      font: 15px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 111, 115, .16);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 20px;
    }

    button,
    .button {
      width: 100%;
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 720;
      cursor: pointer;
      text-decoration: none;
    }

    .button.secondary {
      margin-top: 10px;
      background: var(--soft);
      color: var(--ink);
    }

    .hint {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      margin-top: 12px;
      color: var(--accent);
      font-weight: 680;
      min-height: 24px;
    }

    footer {
      padding: 30px 0 46px;
      border-top: 1px solid var(--line);
      color: var(--muted);
    }

    @media (max-width: 820px) {
      header { display: block; }
      .grid { grid-template-columns: 1fr; }
      textarea { min-height: 560px; }
    }
  </style>
</head>
<body>
  <header>
    <strong>行前体检</strong>
    <a class="back" href="index.html">返回首页</a>
  </header>

  <main>
    <h1>把路线说清楚，诊断才会真的有用。</h1>
    <p class="lead">先复制这份问卷，填完后发给咨询入口。正式上线前不在网页里收集个人信息，避免把敏感行程和联系方式误传到第三方表单。</p>

    <div class="grid">
      <textarea id="brief" spellcheck="false">【路线体检问卷】

1. 基础信息
- 出发日期：
- 总天数：
- 目的地：
- 同行人数与关系：
- 预算区间：
- 是否自驾：
- 语言能力：
- 体力水平：
- 是否有老人/儿童/特殊健康情况：

2. 旅行目标
- 这次旅行最想要的体验：
- 必去地点：
- 可以删掉的地点：
- 是否有摄影/视频/圣地巡礼/登山目标：

3. 已有计划
- Day 1：
- Day 2：
- Day 3：
- Day 4：
- Day 5：
- 更多天数请继续补充：

4. 已确认事项
- 已订航班/车票：
- 已订住宿：
- 已付款项目：
- 不能改动的日期或地点：

5. 最担心的问题
- 你觉得最可能崩的地方：
- 你最希望我帮你判断的问题：

6. 交付偏好
- 只要风险诊断 / 需要完整重排 / 需要拍摄建议 / 需要预算拆解 / 需要装备清单：

提醒：
请不要发送护照号、订单号、完整住址、银行卡、验证码等敏感信息。正式出行前，关键交通、天气、住宿、安全、保险仍需以官方信息为准。</textarea>

      <aside class="panel">
        <button id="copy">复制问卷</button>
        <a class="button secondary" href="privacy.html">查看隐私说明</a>
        <p class="hint">上线初期建议用微信、邮箱或私信承接。确认需求后再报价，不在网页里自动收款。</p>
        <div class="status" id="status"></div>
      </aside>
    </div>
  </main>

  <footer>行前体检会优先判断路线是否可行，而不是帮你塞更多景点。</footer>

  <script>
    document.getElementById("copy").addEventListener("click", async () => {
      const text = document.getElementById("brief").value;
      const status = document.getElementById("status");
      try {
        await navigator.clipboard.writeText(text);
        status.textContent = "已复制";
      } catch {
        document.getElementById("brief").select();
        status.textContent = "已选中文本，请手动复制";
      }
    });
  </script>
</body>
</html>
