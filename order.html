<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>购买意向 | 行前体检</title>
  <meta name="description" content="行前体检测试期购买意向页：资料包、路线体检、深度重排和创作者项目，先人工确认需求，不自动收款。">
  <style>
    :root {
      --ink: #18201d;
      --muted: #5f6963;
      --paper: #f7f4ee;
      --line: #d8d0c3;
      --accent: #2f6f73;
      --white: #fffaf2;
      --soft: #e8ece7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.65;
    }
    header, main, footer {
      width: min(980px, calc(100% - 36px));
      margin: 0 auto;
    }
    header {
      padding: 34px 0 24px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
    }
    a { color: inherit; }
    .back { text-decoration: none; color: var(--muted); font-size: 15px; }
    h1 {
      font-size: clamp(34px, 6vw, 62px);
      line-height: 1.04;
      letter-spacing: 0;
      max-width: 780px;
      margin: 30px 0 14px;
    }
    .lead {
      color: var(--muted);
      font-size: 18px;
      max-width: 760px;
      margin: 0 0 26px;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 340px);
      gap: 20px;
      align-items: start;
      margin: 34px 0 60px;
    }
    textarea {
      width: 100%;
      min-height: 590px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      background: var(--white);
      color: var(--ink);
      font: 15px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      outline: none;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 111, 115, .16);
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 20px;
    }
    button,
    .button {
      width: 100%;
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 720;
      cursor: pointer;
      text-decoration: none;
    }
    .button.secondary {
      margin-top: 10px;
      background: var(--soft);
      color: var(--ink);
    }
    .hint {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .status {
      margin-top: 12px;
      color: var(--accent);
      font-weight: 680;
      min-height: 24px;
    }
    footer {
      padding: 30px 0 46px;
      border-top: 1px solid var(--line);
      color: var(--muted);
    }
    @media (max-width: 820px) {
      header { display: block; }
      .grid { grid-template-columns: 1fr; }
      textarea { min-height: 560px; }
    }
  </style>
</head>
<body>
  <header>
    <strong>行前体检</strong>
    <a class="back" href="products.html">返回资料包</a>
  </header>

  <main>
    <h1>先发购买意向，不急着付款。</h1>
    <p class="lead">测试期先人工确认需求，再说明交付方式和付款路径。网页不会收集个人信息，也不会自动收款。</p>

    <div class="grid">
      <textarea id="brief" spellcheck="false">【购买意向】

1. 我想要的产品/服务
- AI 行程自查 50 问（¥29-49）
- 标准路线体检（¥199）
- 深度重排（¥699 起）
- 创作者项目（¥3000 起）
- 其他：

2. 我的路线背景
- 出发日期：
- 目的地：
- 总天数：
- 同行人数：
- 是否自驾：
- 预算区间：
- 已经用 AI 做过行程吗：

3. 我最想解决的问题
- 哪里最担心走不完：
- 是否涉及雪季/台风/山岳/离岛/夜景/摄影：
- 是否已经订了交通或住宿：

4. 期望交付
- 只要资料包：
- 需要风险诊断：
- 需要完整重排：
- 需要拍摄/内容规划：

5. 来源
- 我是从哪个平台看到的：
- 链接里的 utm_campaign（如果有）：

提醒：
请不要发送护照号、订单号、完整住址、银行卡、验证码等敏感信息。确认适合后再付款。关键交通、天气、住宿、安全、保险仍需以官方信息为准。</textarea>

      <aside class="panel">
        <button id="copy">复制购买意向</button>
        <a class="button secondary" href="contact.html">查看咨询入口</a>
        <a class="button secondary" href="product-ai-itinerary-self-check.html">看自查包样章</a>
        <a class="button secondary" href="privacy.html">查看隐私说明</a>
        <p class="hint">收到购买意向后，先判断是否适合；不适合会直接说明，不引导付款。</p>
        <div class="status" id="status"></div>
      </aside>
    </div>
  </main>

  <footer>只卖原创检查框架、路线判断和人工服务。不做代订代付、保证结果或高风险建议。</footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const product = params.get("product");
    const campaign = params.get("utm_campaign");
    const source = params.get("utm_source");
    const textarea = document.getElementById("brief");
    if (product || campaign || source) {
      textarea.value = textarea.value
        .replace("- 其他：", `- 其他：${product || ""}`)
        .replace("- 我是从哪个平台看到的：", `- 我是从哪个平台看到的：${source || ""}`)
        .replace("- 链接里的 utm_campaign（如果有）：", `- 链接里的 utm_campaign（如果有）：${campaign || ""}`);
    }
    document.getElementById("copy").addEventListener("click", async () => {
      const status = document.getElementById("status");
      try {
        await navigator.clipboard.writeText(textarea.value);
        status.textContent = "已复制";
      } catch {
        textarea.select();
        status.textContent = "已选中文本，请手动复制";
      }
    });
  </script>
</body>
</html>
